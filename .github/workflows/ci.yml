name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # System deps: tauri's GTK/WebKit stack (the app crate builds against it on Linux) +
      # the Linux keyring backend (sync-secret-service). macOS uses WKWebView so needs none.
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev pkg-config patchelf
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Socket Firewall — vet crate fetch (blocks malware at any depth)
        run: |
          npm i -g sfw
          sfw cargo fetch --locked
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Architecture fitness (core purity)
        run: ./scripts/check-core-purity.sh
      - name: Tests
        run: cargo test --workspace
      - name: Supply chain (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
      - name: Unused deps (cargo-machete)
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2
      - name: Coverage (mlt-core >= 80% lines)
        uses: taiki-e/install-action@e49978b799e49ff429d162b7a30601a569ab6538 # v2.81.1
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --package mlt-core --fail-under-lines 80

  frontend:
    name: Frontend gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - name: Socket Firewall — vet dependency install (blocks malware at any depth)
        run: |
          npm i -g sfw
          sfw pnpm install --frozen-lockfile
      - name: Biome (lint + format check)
        run: pnpm exec biome ci .
      - name: Svelte + TypeScript check
        run: pnpm run check
      - name: Frontend unit tests
        run: pnpm test

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      # gitleaks CLI (free, no license) rather than gitleaks-action@v2, which now requires a
      # paid GITLEAKS_LICENSE and fails closed when it can't reach the licensing API.
      - name: Install gitleaks
        run: |
          version=8.30.1
          sha256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${sha256}  gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks.tar.gz
      - name: Scan git history for secrets
        run: gitleaks git --redact --no-banner .

# cargo-deny config — supply-chain gate (advisories, licenses, bans, sources).
# Run: cargo deny check    (see docs/QUALITY_GATES.md §1)

[advisories]
version = 2
# Security VULNERABILITIES are always denied (version=2 default). For "unmaintained"
# notices we only police crates WE directly depend on — the ~16 unmaintained advisories
# today are all tauri's transitive Linux GTK3 stack (atk/gdk/gtk/glib/…), which we can't
# fix until tauri moves to GTK4. Revisit when upgrading tauri.
unmaintained = "workspace"
# Time-boxed exceptions for actual vulnerabilities with no fix yet go here (ID + reason).
ignore = []

[licenses]
version = 2
# Our own crates are publish=false (app + internal libs) — don't require a license on them.
private = { ignore = true }
# Permissive licenses only — no copyleft surprises. Extend deliberately.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0", # webpki-roots (Mozilla CA bundle, via rustls) — permissive data license
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"        # no `*` version requirements
allow-wildcard-paths = true # workspace path deps are fine

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
